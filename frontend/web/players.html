<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Spieler</title>
        <link rel="stylesheet" href="./css/base.css" />
    </head>
    <body>
        <main class="page">
            <h1>Spieler</h1>

            <section class="card">
                <h2>Spieler erstellen</h2>

                <form id="player-form" class="player-form">
                    <label>
                        <span>Vorname</span>
                        <input type="text" name="prename" required />
                    </label>

                    <label>
                        <span>Nachname</span>
                        <input type="text" name="lastname" required />
                    </label>

                    <label>
                        <span>Geburtsdatum</span>
                        <input type="text" name="birthdate" placeholder="DD.MM.JJJJ" />
                    </label>

                    <label>
                        <span>E-Mail</span>
                        <input type="email" name="email" />
                    </label>

                    <label>
                        <span>Telefon</span>
                        <input type="text" name="phone" />
                    </label>

                    <label>
                        <span>Lizenz</span>
                        <input type="text" name="license" />
                    </label>

                    <button type="submit">Spieler anlegen</button>
                </form>

                <p id="player-message" class="message"></p>
            </section>

            <section class="card">
                <h2>Spielerliste</h2>

                <button type="button" id="reload-players-btn">Neu laden</button>

                <div id="players-list" class="players-list">
                    <table class="players-table">
                        <thead>
                            <tr>
                                <th>Vorname</th>
                                <th>Nachname</th>
                                <th>Geburtsdatum</th>
                                <th>E-Mail</th>
                                <th>Telefon</th>
                                <th>Lizenz</th>
                            </tr>
                        </thead>
                        <tbody id="players-table-body">
                            <tr>
                                <td colspan="7">Noch keine Daten geladen.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <script type="module" src="./js/pages/players-page.js"></script>
    </body>
</html>
