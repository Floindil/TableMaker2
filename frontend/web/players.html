<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title data-i18n="player.title"></title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <section class="card">
        <div class="actions" style="justify-content: space-between;">
            <h2 data-i18n="player.title"></h2>

            <div>
                <label for="language-switcher" data-i18n="common.language"></label>
                <select id="language-switcher"></select>
            </div>
        </div>

        <div class="actions">
            <button type="button" id="open-player-modal-btn" data-i18n="player.create"></button>
            <button type="button" id="reload-players-btn" data-i18n="common.reload"></button>
        </div>

        <div class="players-list">
            <table class="players-table">
                <thead>
                    <tr>
                        <th data-i18n="field.firstName"></th>
                        <th data-i18n="field.lastName"></th>
                        <th data-i18n="field.birthdate"></th>
                        <th data-i18n="field.email"></th>
                        <th data-i18n="field.phone"></th>
                        <th data-i18n="field.license"></th>
                        <th data-i18n="common.actions"></th>
                    </tr>
                </thead>
                <tbody id="players-table-body">
                    <tr>
                        <td colspan="7" data-i18n="messages.noDataLoaded"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <div id="player-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="player.create"></h2>
                <button type="button" id="close-player-modal-btn" class="close" data-i18n-title="common.close">x</button>
            </div>

            <form id="player-form" class="player-form">
                <label>
                    <span data-i18n="field.firstName"></span>
                    <input type="text" name="prename" required>
                </label>

                <label>
                    <span data-i18n="field.lastName"></span>
                    <input type="text" name="lastname" required>
                </label>

                <label>
                    <span data-i18n="field.birthdate"></span>
                    <input type="text" name="birthdate" data-i18n-placeholder="field.datePlaceholder" placeholder="DD.MM.JJJJ">
                </label>

                <label>
                    <span data-i18n="field.email"></span>
                    <input type="email" name="email">
                </label>

                <label>
                    <span data-i18n="field.phone"></span>
                    <input type="text" name="phone">
                </label>

                <label>
                    <span data-i18n="field.license"></span>
                    <input type="text" name="license">
                </label>

                <input type="hidden" id="player-id" name="player-id">

                <button type="submit" id="submit-button" data-i18n="player.create"></button>
            </form>

            <p id="player-message" class="message"></p>
        </div>
    </div>

    <script type="module" src="js/pages/players-page.js"></script>
</body>
</html>
